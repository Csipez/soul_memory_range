<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soul Memory Range Checker</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #1e1e1e;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background-color: #2b2b2b;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input, select, button {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: none;
        font-size: 14px;
    }

    input, select {
        background-color: #3a3a3a;
        color: white;
    }

    button {
        background-color: #4CAF50;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background-color: #45a049;
    }

    .result {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
    }

    .match {
        color: #4CAF50;
    }

    .no-match {
        color: #ff4c4c;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Dark Souls 2: Scholar of the First Sin Soul Memory Range Checker</h2>

    <input type="number" id="host" placeholder="Host Soul Memory">
    <input type="number" id="summon" placeholder="Summon Soul Memory">

    <select id="item">
        <option value="0">White Sign Soapstone</option>
        <option value="1">White Sign Soapstone + Name-Engraved Ring</option>
        <option value="2">Small White Sign Soapstone</option>
        <option value="3">Small White Sign Soapstone + Name-Engraved Ring</option>
        <option value="4">Cracked Red Eye Orb & Bell Keepers</option>
        <option value="5">Cracked Blue Eye Orb</option>
        <option value="6">Red Sign Soapstone</option>
        <option value="7">Dragon Eye</option>
        <option value="8">Rat King Covenant</option>
    </select>

    <button onclick="checkMatch()">Check Match</button>

    <div class="result" id="result"></div>
</div>

<script>
const souls = [
[0, 9999],[10000, 19999],[20000, 29999],[30000, 39999],[40000, 49999],
[50000, 69999],[70000, 89999],[90000, 109999],[110000, 129999],
[130000, 149999],[150000, 179999],[180000, 209999],[210000, 239999],
[240000, 269999],[270000, 299999],[300000, 349999],[350000, 399999],
[400000, 449999],[450000, 499999],[500000, 599999],[600000, 699999],
[700000, 799999],[800000, 899999],[900000, 999999],[1000000, 1099999],
[1100000, 1199999],[1200000, 1299999],[1300000, 1399999],
[1400000, 1499999],[1500000, 1749999],[1750000, 1999999],
[2000000, 2249999],[2250000, 2499999],[2500000, 2749999],
[2750000, 2999999],[3000000, 4999999],[5000000, 6999999],
[7000000, 8999999],[9000000, 11999999],[12000000, 14999999],
[15000000, 19999999],[20000000, 29999999],
[30000000, 44999999],[45000000, 999999999]
];

function findBracket(value) {
    for (let i = 0; i < souls.length; i++) {
        if (value >= souls[i][0] && value <= souls[i][1]) {
            return i;
        }
    }
    return -1;
}

function clampIndex(index) {
    return Math.max(0, Math.min(index, souls.length - 1));
}

function checkMatch() {
    const host = parseInt(document.getElementById("host").value);
    const summon = parseInt(document.getElementById("summon").value);
    const mode = parseInt(document.getElementById("item").value);
    const resultDiv = document.getElementById("result");

    if (isNaN(host) || isNaN(summon)) {
        resultDiv.innerHTML = "Please enter valid numbers.";
        resultDiv.className = "result no-match";
        return;
    }

    const hostBracket = findBracket(host);
    if (hostBracket === -1) {
        resultDiv.innerHTML = "Host soul memory out of range.";
        resultDiv.className = "result no-match";
        return;
    }

    const ranges = [
        [-2, +1],  // 0
        [-5, +4],  // 1
        [-3, +1],  // 2
        [-6, +5],  // 3
        [0, +3],   // 4
        [-2, +2],  // 5
        [-3, +2],  // 6
        [-4, +4],  // 7
        [-1, +3]   // 8
    ];

    const offset = ranges[mode];
    const minIndex = clampIndex(hostBracket + offset[0]);
    const maxIndex = clampIndex(hostBracket + offset[1]);

    const minValue = souls[minIndex][0];
    const maxValue = souls[maxIndex][1];

    if (summon >= minValue && summon <= maxValue) {
        resultDiv.innerHTML = "Matchable ✔";
        resultDiv.className = "result match";
    } else {
        resultDiv.innerHTML = "Not Matchable ✖";
        resultDiv.className = "result no-match";
    }
}
</script>

</body>
</html>
